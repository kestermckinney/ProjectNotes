name: Flatpak Release

# Builds, signs, and publishes the Linux Flatpak when a version tag is pushed.
# Outputs:
#   * a GPG-signed ostree repo deployed to the DEDICATED Pages repo
#     (kestermckinney/projectnotes-flatpak), giving users `flatpak update`;
#   * a single-file ProjectNotes.flatpak bundle attached to the GitHub Release.
#
# The manifest clones the app + SqliteSyncPro from their PINNED commits, so make
# sure those commits are pushed and the manifest is bumped before tagging.
#
# Required repository secrets (Settings > Secrets and variables > Actions):
#   FLATPAK_GPG_PRIVATE_KEY   ASCII-armored private signing key (full block)
#   FLATPAK_GPG_KEY_ID        The signing key's ID / fingerprint / uid
#   FLATPAK_GPG_PASSPHRASE    Passphrase for the signing key (preset into the
#                             agent so ostree can sign non-interactively)
#   FLATPAK_PAGES_DEPLOY_TOKEN  PAT with `repo` scope on projectnotes-flatpak
#
# First-run checklist lives in docs/Introduction/InstallLinux.md.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

# The dedicated Pages repo that hosts ONLY the ostree repo. Kept separate from
# the product site at kestermckinney.github.io/ProjectNotes so releases can
# never clobber it.
env:
  PAGES_REPO: kestermckinney/projectnotes-flatpak
  PAGES_BRANCH: gh-pages
  FLATPAKREPO_URL: https://kestermckinney.github.io/projectnotes-flatpak/projectnotes.flatpakrepo

jobs:
  build:
    runs-on: ubuntu-latest
    # Image ships flatpak + flatpak-builder + the org.kde Platform/SDK 6.9.
    # bubblewrap needs elevated privileges to build inside the container.
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:kde-6.9
      options: --privileged

    steps:
      - name: Checkout packaging sources
        uses: actions/checkout@v5

      - name: Install build-time bases (Qt WebEngine BaseApp)
        run: |
          flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install -y --noninteractive flathub io.qt.qtwebengine.BaseApp//6.9

      - name: Import GPG signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.FLATPAK_GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.FLATPAK_GPG_PASSPHRASE }}
        run: |
          export GNUPGHOME="$RUNNER_TEMP/gnupg"
          mkdir -p "$GNUPGHOME"; chmod 700 "$GNUPGHOME"
          # The signing key is passphrase-protected and ostree signs via gpgme/
          # gpg-agent with no pinentry in this container. Let the agent take a
          # preset passphrase and cache it long enough to outlast the ~25-min
          # build before the export signs the commit.
          printf '%s\n' allow-loopback-pinentry allow-preset-passphrase \
            'default-cache-ttl 21600' 'max-cache-ttl 21600' \
            > "$GNUPGHOME/gpg-agent.conf"
          gpgconf --kill gpg-agent || true
          printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --import
          # Preset the passphrase for every (sub)key keygrip so signing the
          # ostree commit needs no interactive prompt.
          preset="$(gpgconf --list-dirs libexecdir)/gpg-preset-passphrase"
          gpg --batch --with-colons --with-keygrip --list-secret-keys \
            | awk -F: '$1 == "grp" { print $10 }' \
            | while read -r grip; do
                printf '%s' "$GPG_PASSPHRASE" | "$preset" --preset "$grip"
              done
          echo "GNUPGHOME=$GNUPGHOME" >> "$GITHUB_ENV"

      - name: Fetch already-published repo (preserve update history)
        # Clone the live ostree repo so flatpak-builder exports incrementally
        # into it; existing users get a delta, not a full re-download. Only seed
        # flatpak-repo when the clone is a real ostree repo (has objects/) —
        # otherwise flatpak-builder aborts with "opendir(objects)". On the first
        # release gh-pages holds only the staged extras (.flatpakrepo/icon), so
        # we start fresh and let flatpak-builder initialize the repo.
        run: |
          DEST="$GITHUB_WORKSPACE/packaging/linux/flatpak-repo"
          if git clone --branch "$PAGES_BRANCH" --depth 1 \
               "https://x-access-token:${{ secrets.FLATPAK_PAGES_DEPLOY_TOKEN }}@github.com/${PAGES_REPO}.git" \
               "$RUNNER_TEMP/published" 2>/dev/null && [ -d "$RUNNER_TEMP/published/objects" ]; then
            cp -a "$RUNNER_TEMP/published" "$DEST"
            # Drop the .git so it isn't re-published as repo content.
            rm -rf "$DEST/.git" 2>/dev/null || true
            echo "Seeded from published ostree repo (preserving update history)."
          else
            echo "No published ostree repo yet — starting fresh."
          fi

      - name: Ensure dbus machine-id (container has none)
        # The flatpak-builder image ships no /etc/machine-id, so dbus activation
        # during the build can't start a bus. Generate one before building.
        run: |
          mkdir -p /var/lib/dbus
          if [ ! -s /etc/machine-id ]; then
            dbus-uuidgen | tee /etc/machine-id /var/lib/dbus/machine-id >/dev/null 2>&1 \
              || dbus-uuidgen --ensure=/etc/machine-id
          fi

      - name: Pin sources for this release
        # The manifest builds ProjectNotes + SqliteSyncPro from pinned git
        # commits. For a tagged (or dispatched) release those pins MUST track the
        # release — otherwise the build silently ships whatever the hardcoded pin
        # points at, which is how v5.2.1 first published 5.2.0. Resolve both here:
        #   * projectnotes  -> the checked-out SHA (github.sha) of this ref;
        #   * SqliteSyncPro -> its default-branch (HEAD) tip, since it's a
        #     separate, untagged repo co-developed on the same branch.
        # ls-remote HEAD follows whatever the default branch is (master/main).
        working-directory: packaging/linux
        env:
          PN_SHA: ${{ github.sha }}
        run: |
          manifest="com.projectnotespro.ProjectNotes.yml"
          ss_sha="$(git ls-remote https://github.com/kestermckinney/SqliteSyncPro.git HEAD | awk 'NR==1 {print $1}')"
          case "$ss_sha" in
            [0-9a-f][0-9a-f][0-9a-f][0-9a-f]*) ;;
            *) echo "ERROR: could not resolve SqliteSyncPro HEAD (got '$ss_sha')"; exit 1 ;;
          esac
          awk -v pn="$PN_SHA" -v ss="$ss_sha" '
            /url: .*kestermckinney\/ProjectNotes\.git/  { inpn = 1 }
            inpn && /^[[:space:]]*commit:/ { sub(/commit:.*/, "commit: " pn); inpn = 0 }
            /url: .*kestermckinney\/SqliteSyncPro\.git/ { inss = 1 }
            inss && /^[[:space:]]*commit:/ { sub(/commit:.*/, "commit: " ss); inss = 0 }
            { print }
          ' "$manifest" > "$manifest.tmp" && mv "$manifest.tmp" "$manifest"
          echo "Pinned projectnotes  -> $PN_SHA"
          echo "Pinned SqliteSyncPro -> $ss_sha"
          grep -nE "kestermckinney/(ProjectNotes|SqliteSyncPro)\.git|commit:" "$manifest"

      - name: Build, sign, and bundle
        working-directory: packaging/linux
        env:
          GPG_KEY_ID: ${{ secrets.FLATPAK_GPG_KEY_ID }}
          GPG_HOMEDIR: ${{ env.GNUPGHOME }}
          RUNTIME_REPO_URL: ${{ env.FLATPAKREPO_URL }}
          STRICT: '0'
          # rofiles-fuse (FUSE) can't spawn inside the CI container; opt out.
          DISABLE_ROFILES_FUSE: '1'
        run: |
          ./build-flatpak.sh build
          ./build-flatpak.sh repo
          ./build-flatpak.sh bundle

      - name: Stage publishable extras into the repo
        # Serve the .flatpakrepo and icon from the Pages root alongside ostree.
        working-directory: packaging/linux
        run: |
          cp projectnotes.flatpakrepo flatpak-repo/projectnotes.flatpakrepo
          cp icons/256x256/com.projectnotespro.ProjectNotes.png flatpak-repo/icon.png
          touch flatpak-repo/.nojekyll

      - name: Deploy ostree repo to dedicated Pages repo
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.FLATPAK_PAGES_DEPLOY_TOKEN }}
          external_repository: kestermckinney/projectnotes-flatpak
          publish_branch: gh-pages
          publish_dir: packaging/linux/flatpak-repo
          # Single-commit branch: keeps repo size bounded while retaining all
          # current ostree objects (old + new versions) as files.
          force_orphan: true
          commit_message: "Publish Flatpak ${{ github.ref_name }}"

      - name: Attach bundle + flatpakrepo to the GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            packaging/linux/ProjectNotes.flatpak
            packaging/linux/projectnotes.flatpakrepo
          body: |
            ### Install on Linux (Flatpak)

            **Auto-updating (recommended):**
            ```bash
            flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
            flatpak remote-add --if-not-exists projectnotes ${{ env.FLATPAKREPO_URL }}
            flatpak install projectnotes com.projectnotespro.ProjectNotes
            ```

            **One-file install:** download `ProjectNotes.flatpak` below, then
            `flatpak install ProjectNotes.flatpak` (also wires up `flatpak update`).
