# ── PyQt6-WebEngine bindings, built from source against the BaseApp's Qt ─────
#
# Qt WebEngine itself is supplied by `base: io.qt.qtwebengine.BaseApp`
# (base-version 6.9), which is Qt WebEngine compiled from source against the
# SAME org.kde.Platform 6.9 / Qt 6.9.x this app uses — so it shares the runtime
# Qt rather than dragging in a second Qt stack. The BaseApp populates /app with
# libQt6WebEngine*, headers, cmake configs and qmake .pri files before our
# modules build.
#
# Here we compile only the Python bindings (PyQt6-WebEngine 6.9.0) on top of the
# PyQt6 built by python-pyqt6.yaml. As with PyQt6, this is built from the sdist
# rather than a PyPI wheel so the bindings link the runtime/BaseApp Qt.
#
# Two things make the bindings find Qt WebEngine:
#   * QMAKEPATH=/app    — so the runtime's qmake6 also searches /app/mkspecs for
#                         the WebEngine module .pri files installed by the BaseApp
#   * PyQt6 on PYTHONPATH — PyQt6-WebEngine needs the PyQt6 bindings .sip files
#                           (shipped inside the PyQt6 install) to compile against
name: python3-pyqt6-webengine
buildsystem: simple
build-commands:
  - |
    set -e
    # Build backend into a throwaway prefix (not shipped in the app).
    TOOLS="$PWD/_tools"
    pip3 install --no-index --find-links="file://$PWD" --prefix="$TOOLS" \
        ply packaging setuptools sip PyQt-builder
    export PATH="$TOOLS/bin:$PATH"
    # PyQt6 (built by python-pyqt6.yaml, installed in /app) provides the bindings
    # .sip files; the build tools live in $TOOLS.
    export PYTHONPATH="$TOOLS/lib/python3.12/site-packages:$FLATPAK_DEST/lib/python3.12/site-packages"
    # qmake6 is the runtime Qt (/usr); Qt WebEngine from the BaseApp lives in /app.
    export QMAKEPATH=/app

    # Build only the bindings the plugins use (QWebEngineView lives in
    # QtWebEngineWidgets; QWebEnginePage/printToPdf in QtWebEngineCore). Skip
    # QtWebEngineQuick (QML). --jobs capped low to bound memory use.
    # NB: unlike PyQt6, PyQt6-WebEngine's sip-wheel has no --confirm-license flag.
    # --no-same-owner: as root in the CI user namespace, restoring the
    # archive's original uid/gid (501:20) fails with EINVAL and aborts tar.
    tar xf pyqt6_webengine-6.9.0.tar.gz --no-same-owner
    cd pyqt6_webengine-6.9.0
    # sip resolves imported PyQt6 .sip files under <target_dir>/PyQt6/bindings,
    # and target_dir defaults to the build interpreter's site-packages (in /usr,
    # read-only) — not where we installed PyQt6 (/app). sip-wheel has no flag for
    # the search path, so point sip-include-dirs at the installed PyQt6 bindings.
    sed -i "/^\[tool\.sip\.project\]/a sip-include-dirs = [\"$FLATPAK_DEST/lib/python3.12/site-packages/PyQt6/bindings\"]" pyproject.toml
    sip-wheel --verbose \
        --qmake /usr/bin/qmake6 \
        --enable QtWebEngineCore --enable QtWebEngineWidgets \
        --jobs "${FLATPAK_BUILDER_N_JOBS_PN:-2}"

    # sip-wheel emits a PEP 503-normalised (lowercase) filename, e.g.
    # pyqt6_webengine-6.9.0-cp310-abi3-manylinux_2_28_x86_64.whl
    pip3 install --no-index --no-deps --prefix="$FLATPAK_DEST" pyqt6_webengine-*.whl
