app-id: com.kestermckinney.projectnotes
runtime: org.kde.Platform
runtime-version: '6.9'
sdk: org.kde.Sdk
command: projectnotes

finish-args:
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --filesystem=home
  - --device=dri

modules:
  # ── Python plugin dependencies (offline, generated by flatpak-pip-generator) ──
  - python-deps.yaml

  # ── Hunspell 1.7 (spell checking) ─────────────────────────────────────────
  - name: hunspell
    buildsystem: autotools
    sources:
      - type: archive
        url: https://github.com/hunspell/hunspell/releases/download/v1.7.2/hunspell-1.7.2.tar.gz
        sha256: 11ddfa39afe28c28539fe65fc4f1592d410c1e9b6dd7d8a91ca25d85e9ec65b8

  # ── ProjectNotes ───────────────────────────────────────────────────────────
  - name: projectnotes
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DSQLITESYNCPRO_SRC_DIR=SqliteSyncPro/src
    sources:
      # Build from the local working copy instead of cloning from GitHub.
      # The path is relative to this manifest (packaging/linux/).
      - type: dir
        path: ../..
      # Build SqliteSyncPro from the local sibling checkout instead of cloning
      # from GitHub. ProjectNotes and SqliteSyncPro are co-developed on the same
      # branch, so building both from the local working copy keeps them in sync
      # and avoids cloning a stale branch that lacks the pro-version sync API
      # (e.g. the SubscriptionStatus struct). Path is relative to this manifest.
      - type: dir
        path: ../../../SqliteSyncPro
        dest: SqliteSyncPro
