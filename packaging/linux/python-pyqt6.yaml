# ── PyQt6 built from source against the runtime's Qt (offline) ───────────────
#
# org.kde.Platform//6.9 ships Qt 6.9.3 but NOT PyQt6, and the embedded Python
# interpreter (the runtime's Python 3.12) needs PyQt6 for the plugin system.
#
# PyQt6 is built from its sdist with sip-wheel rather than installed from a PyPI
# wheel on purpose: the PyPI wheel bundles its own private copy of Qt, and the
# plugins run *inside* the ProjectNotes process which has already loaded the
# runtime's Qt. Two Qt copies (two QApplication globals) in one process is
# unreliable, so PyQt6 must link the same Qt the C++ app links — the runtime's.
#
# Versions are pinned to match Qt 6.9.x (PyQt6 X.Y requires Qt >= X.Y):
#   PyQt6 6.9.1, PyQt6-sip 13.10.2
# Build tools (sip, PyQt-builder, ply, packaging, setuptools) are vendored as
# wheels and installed into a throwaway prefix so they do not ship in the app.
#
# Regenerate the source list with build-flatpak.sh regen-pip if versions change.
name: python3-pyqt6
buildsystem: simple
build-commands:
  - |
    set -e
    # 1. Build backend into a throwaway prefix (not shipped in the app).
    TOOLS="$PWD/_tools"
    pip3 install --no-index --find-links="file://$PWD" --prefix="$TOOLS" \
        ply packaging setuptools sip PyQt-builder
    export PATH="$TOOLS/bin:$PATH"
    export PYTHONPATH="$TOOLS/lib/python3.12/site-packages"

    # 2. Runtime sip module into the app prefix (required by the bindings).
    pip3 install --no-index --no-deps --find-links="file://$PWD" \
        --prefix="$FLATPAK_DEST" PyQt6-sip

    # 3. Compile PyQt6 against the runtime Qt (qmake6 from the SDK) into a wheel.
    #    Build ONLY the bindings the plugins use, plus the modules the
    #    PyQt6-WebEngine bindings %Import (QtNetwork/QtPrintSupport/QtWebChannel).
    #    Building all ~35 modules is unnecessary and exhausts RAM on small hosts.
    #    --jobs is capped low for the same reason (each g++ on the generated
    #    sources is memory-hungry); raise it if the build host has plenty of RAM.
    # --no-same-owner: as root in the CI user namespace, restoring the
    # archive's original uid/gid (501:20) fails with EINVAL and aborts tar.
    tar xf pyqt6-6.9.1.tar.gz --no-same-owner
    cd pyqt6-6.9.1
    sip-wheel --confirm-license --verbose \
        --qmake /usr/bin/qmake6 \
        --enable QtCore --enable QtGui --enable QtWidgets \
        --enable QtSql --enable QtXml \
        --enable QtNetwork --enable QtPrintSupport --enable QtWebChannel \
        --jobs "${FLATPAK_BUILDER_N_JOBS_PN:-2}"

    # 4. Install the freshly built wheel into the app prefix.
    #    sip-wheel emits a PEP 503-normalised (lowercase) filename, e.g.
    #    pyqt6-6.9.1-cp310-abi3-manylinux_2_28_x86_64.whl
    pip3 install --no-index --no-deps --prefix="$FLATPAK_DEST" pyqt6-*.whl
