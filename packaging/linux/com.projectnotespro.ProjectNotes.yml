app-id: com.projectnotespro.ProjectNotes
runtime: org.kde.Platform
runtime-version: '6.9'
sdk: org.kde.Sdk
# Qt WebEngine compiled from source against this same org.kde Qt 6.9, supplied
# as a base layer. Needed by the PDF-export plugins (PyQt6.QtWebEngineWidgets).
base: io.qt.qtwebengine.BaseApp
base-version: '6.9'
command: projectnotes

finish-args:
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  # Full home access is core to the product, not a convenience:
  #  * The app scans the user's folders to discover project-related files and
  #    surface them against the matching project.
  #  * Plugins export generated reports and archived email content into the
  #    user's own project folders (arbitrary locations the user chooses).
  #  * Users author personal plugins in their own "Project Notes" folder, which
  #    the app loads and hot-reloads at runtime.
  # These span arbitrary user-chosen paths, so a narrower portal/xdg scope would
  # break core features. NOTE: the Flathub linter flags broad home access and a
  # maintainer would have to grant an exception. We self-host the repo
  # (kestermckinney.github.io/projectnotes-flatpak) instead, so there is no such
  # gate — this permission installs as-is. The justification above is kept as
  # documentation of why the scope is necessary.
  - --filesystem=home
  - --device=dri
  # Qt WebEngine (from the BaseApp) installs under /app, but the runtime Qt's
  # baked-in prefix is /usr, so it can't find the process/resources/locales on
  # its own. Point it at the /app locations. Needed by the PDF-export plugins.
  - --env=QTWEBENGINEPROCESS_PATH=/app/lib/libexec/QtWebEngineProcess
  - --env=QTWEBENGINE_RESOURCES_PATH=/app/resources
  - --env=QTWEBENGINE_LOCALES_PATH=/app/translations/qtwebengine_locales

modules:
  # ── Python plugin dependencies (offline, generated by flatpak-pip-generator) ──
  - python-deps.yaml

  # ── PyQt6 built from source against the runtime Qt (offline) ──────────────
  # Required by the plugin system; not shipped by org.kde.Platform. See the
  # file header for why it is compiled rather than installed from a PyPI wheel.
  - python-pyqt6.yaml

  # ── PyQt6-WebEngine bindings, built against the BaseApp's Qt WebEngine ─────
  # Needed by the PDF-export plugins. Must come after python-pyqt6.yaml.
  - python-pyqt6-webengine.yaml

  # ── Hunspell 1.7 (spell checking) ─────────────────────────────────────────
  - name: hunspell
    buildsystem: autotools
    sources:
      - type: archive
        url: https://github.com/hunspell/hunspell/releases/download/v1.7.2/hunspell-1.7.2.tar.gz
        sha256: 11ddfa39afe28c28539fe65fc4f1592d410c1e9b6dd7d8a91ca25d85e9ec65b8

  # ── ProjectNotes ───────────────────────────────────────────────────────────
  - name: projectnotes
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DSQLITESYNCPRO_SRC_DIR=SqliteSyncPro/src
    sources:
      # Pinned git sources for reproducible, Flathub-compatible builds.
      # Flathub does not accept `type: dir`; sources must be immutable and
      # fetched from the public remote. The pinned commit MUST be pushed to
      # origin or flatpak-builder cannot fetch it.
      #
      # NOTE: the release workflow (.github/workflows/flatpak-release.yml)
      # overwrites the projectnotes `commit:` below with the tag's own SHA at
      # build time, so a tagged release always builds its own commit. The value
      # here is only used for local/manual `build-flatpak.sh` runs — keep it
      # pointing at the latest released commit.
      - type: git
        url: https://github.com/kestermckinney/ProjectNotes.git
        commit: 2a574c8845c27aba5fb4a6c7e4d67bf0d2a0e975
      # SqliteSyncPro is co-developed on the same branch (the repo has no tags).
      # Cloned into SqliteSyncPro/ to match the cmake config-opt
      # -DSQLITESYNCPRO_SRC_DIR=SqliteSyncPro/src. The release workflow resolves
      # its default-branch (HEAD) tip at build time and overwrites the `commit:`
      # below, so a release always pairs with the latest sync code. The value
      # here is only the fallback for local/manual build-flatpak.sh runs.
      - type: git
        url: https://github.com/kestermckinney/SqliteSyncPro.git
        commit: 115f295251548779fa2bfb6720c8f4149e52a4d2
        dest: SqliteSyncPro
